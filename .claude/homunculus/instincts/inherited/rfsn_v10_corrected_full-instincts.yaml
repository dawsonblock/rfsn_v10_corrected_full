# Rfsn_v10_corrected_full Workflow Release Artifact Generation And Proof Consistency

## Action

Follow the release-artifact-generation-and-proof-consistency workflow:
1. Rebrand or create new artifact directories/files for the new Main version (e.g., artifacts/proof/mainXX/...)
2. Regenerate or update benchmark JSON files (e.g., kernel_benchmark.json, fused_kernel_benchmark.json, generation_smoke.json, generation_throughput.json)
3. Update or auto-generate proof_summary.md and summary.json from JSON artifacts
4. Update README.md to reflect new status and results
5. Update or harden integrity and consistency checking scripts (e.g., check_release_integrity.py, check_proof_summary_consistency.py, generate_proof_summary.py)
6. Ensure all integrity checks pass and package the release

