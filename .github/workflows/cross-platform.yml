name: Cross-Platform Backend Tests

on:
  push:
    branches: [main, feature/*]
  pull_request:
  workflow_dispatch:

jobs:
  test-macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lock Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[mlx,dev]"
      - name: Test Metal backend
        run: |
          python -c "from rfsn_v10.kernels import backend; assert backend.name == 'metal'"
          pytest tests/test_attention.py tests/test_drift.py -v

  test-macos-x86:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lock Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[mlx,dev]"
      - name: Test Metal backend
        run: |
          python -c "from rfsn_v10.kernels import backend; assert backend.name == 'metal'"
          pytest tests/test_attention.py tests/test_drift.py -v

  test-ubuntu-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps (no MLX)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test NumPy backend
        env:
          RFSN_BACKEND: numpy
        run: |
          python -c "from rfsn_v10.kernels import backend; assert backend.name == 'numpy'"
          python -c "
          import numpy as np
          from rfsn_v10.kernels import backend
          packed, n = backend.pack_bits(np.array([1,2,3,4], dtype=np.uint32), bits=4)
          codes = backend.unpack_bits(packed, n, bits=4)
          assert np.array_equal(codes, [1,2,3,4])
          print('NumPy backend OK')
          "
