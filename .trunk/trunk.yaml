# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.10.0
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  enabled:
    - bandit@1.9.4
    - black@26.5.1
    - git-diff-check
    - isort@8.0.1
    - markdownlint@0.48.0
    - prettier@3.8.3
    - ruff@0.15.15
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
    - trufflehog@3.95.3
actions:
  disabled:
    - trunk-announce
    - trunk-fmt-pre-commit
  enabled:
    - proof-regression-gate
    - trunk-upgrade-available
  definitions:
    - id: proof-regression-gate
      display_name: Proof Regression Gate
      description: Generate proof artifacts and block push when drift exceeds thresholds.
      run: bash scripts/run_proof_regression_gate.sh
      run_from: workspace
      triggers:
        - git_hooks: [pre-push]
