version: '3.8'

# NOTE: This is the production compose file. No HTTP service is exposed because
# rfsn-v10 is a CLI tool, not a server. Port 8080 is intentionally absent.
# For local development with ClickHouse port access, use docker-compose.dev.yml.

services:
  rfsn:
    build: .
    container_name: rfsn-v10
    volumes:
      - ./artifacts:/app/artifacts
      - ./results:/app/results
      - rfsn_cache:/app/.cache
    environment:
      - RFSN_LOG_LEVEL=INFO
      - RFSN_CACHE_DIR=/app/.cache
      - RFSN_METRICS_ENABLED=true
      - RFSN_BACKEND=numpy
      # CLICKHOUSE_PASSWORD is required — no default. Set it in a .env file.
      # Use docker-compose.dev.yml override to allow empty password locally.
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    # No ports: rfsn is a CLI tool, not an HTTP service
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "rfsn_v10", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: rfsn-clickhouse
    # Only expose HTTP port (8123) by default for production use.
    # Native protocol port (9000) is disabled here; use docker-compose.dev.yml
    # to enable it for local development.
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=rfsn
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  rfsn_cache:
    driver: local
  clickhouse_data:
    driver: local
