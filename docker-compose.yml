version: '3.8'

# NOTE: RFSN v10 inference server + ClickHouse telemetry.
# The FastAPI server runs on port 8000.
# For local development with ClickHouse port access, use docker-compose.dev.yml.
# Docker uses CPU-only (numpy) backend. For MLX acceleration, run natively on macOS.

services:
  rfsn:
    build: .
    container_name: rfsn-v10
    volumes:
      - ./artifacts:/app/artifacts
      - ./results:/app/results
      - rfsn_cache:/app/.cache
    command: ["python", "-m", "rfsn_v10.server"]
    environment:
      - RFSN_LOG_LEVEL=INFO
      - RFSN_CACHE_DIR=/app/.cache
      - RFSN_METRICS_ENABLED=true
      - RFSN_BACKEND=numpy
      # RFSN_MODEL_ID is required for the inference server to start.
      - RFSN_MODEL_ID=${RFSN_MODEL_ID:-}
      # CLICKHOUSE_PASSWORD is required — compose will fail with a clear error
      # if it is unset. Use docker-compose.dev.yml override for local dev.
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required. Set it in a .env file. See .env.example.}
    ports:
      - "8000:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "rfsn_v10", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: rfsn-clickhouse
    # Only expose HTTP port (8123) by default for production use.
    # Native protocol port (9000) is disabled here; use docker-compose.dev.yml
    # to enable it for local development.
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=rfsn
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required. Set it in a .env file. See .env.example.}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  rfsn_cache:
    driver: local
  clickhouse_data:
    driver: local
