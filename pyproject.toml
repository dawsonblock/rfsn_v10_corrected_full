[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rfsn-v10"
version = "0.1.0"
description = "RFSN v10 - Quantized KV-cache + decode-time sparse-attention runtime for MLX/Apple Silicon"
requires-python = ">=3.10"
dependencies = [
    "mlx>=0.10.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio",
]

[tool.setuptools.packages.find]
include = ["rfsn_v10*"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
