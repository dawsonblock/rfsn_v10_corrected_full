[pytest]
addopts = -q
testpaths = tests
norecursedirs =
    .git
    .github
    .trunk
    __pycache__
    .pytest_cache
    .mypy_cache
    .ruff_cache
    build
    dist
    release_tmp
    tmp
    temp
    .tmp
markers =
    integration: marks tests as integration tests (requires running services)
    e2e: marks tests as end-to-end tests (requires full stack)
    mlx: marks tests that require Apple Silicon + MLX
    slow: marks tests that are slow or resource-intensive